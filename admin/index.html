<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLY ZS | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
    <div id="toast-container"></div>

    <main class="admin-shell">
        <section class="admin-login" id="adminLoginView">
            <a href="../" class="admin-back-link"><i class="fas fa-arrow-left"></i> Volver al sitio</a>
            <div class="admin-login-card">
                <div class="admin-modal-icon"><i class="fas fa-lock"></i></div>
                <h1>ADMIN ONLY ZS</h1>
                <p>Ingresá con la cuenta autorizada en Firebase Authentication.</p>
                <form id="adminLoginForm" class="admin-form" novalidate>
                    <label for="adminEmail">Email</label>
                    <input type="email" id="adminEmail" autocomplete="email" required>
                    <label for="adminPassword">Contraseña</label>
                    <input type="password" id="adminPassword" autocomplete="current-password" required>
                    <button type="submit" class="btn btn-dark">INGRESAR</button>
                </form>
            </div>
        </section>

        <section class="admin-dashboard" id="adminDashboardView" hidden>
            <header class="admin-dashboard-header">
                <div>
                    <a href="../" class="admin-back-link"><i class="fas fa-arrow-left"></i> Volver al sitio</a>
                    <h1>MODERACIÓN</h1>
                    <p>Comentarios y fotos se publican solo después de aprobarlos.</p>
                </div>
                <button class="btn-icon-outline" id="adminLogoutButton">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </header>

            <div class="admin-tabs">
                <button class="admin-tab active" data-admin-tab="comments">Comentarios <span id="commentsCount">0</span></button>
                <button class="admin-tab" data-admin-tab="photos">Fotos <span id="photosCount">0</span></button>
            </div>

            <section class="admin-panel active" id="commentsPanel">
                <div class="admin-panel-header">
                    <h2>COMENTARIOS PENDIENTES</h2>
                </div>
                <div class="admin-list" id="pendingCommentsList"></div>
            </section>

            <section class="admin-panel" id="photosPanel">
                <div class="admin-panel-header">
                    <h2>FOTOS PENDIENTES</h2>
                </div>
                <div class="admin-list admin-photo-list" id="pendingPhotosList"></div>
            </section>
        </section>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
